name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: passfort_test
          MYSQL_USER: passfort_user
          MYSQL_PASSWORD: passfort_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u passfort_user -ppassfort_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Установка PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, openssl, sodium, redis, rdkafka
          coverage: none

      - name: Кэш Composer зависимостей
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Генерация JWT ключей
        run: |
          mkdir -p backend/config/jwt
          openssl genpkey -algorithm RSA -out backend/config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:jkl
          openssl rsa -pubout -in backend/config/jwt/private.pem -out backend/config/jwt/public.pem -passin pass:jkl

      - name: Создание .env для CI
        run: |
          echo "APP_ENV=test" > backend/.env
          echo "DATABASE_URL=mysql://passfort_user:passfort_password@127.0.0.1:3306/passfort_test?serverVersion=8.0&charset=utf8mb4" >> backend/.env
          echo "REDIS_URL=redis://127.0.0.1:6379" >> backend/.env
          echo "REDIS_DSN=redis://127.0.0.1:6379" >> backend/.env
          echo "MESSENGER_TRANSPORT_DSN=kafka://localhost:9092" >> backend/.env
          echo "JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem" >> backend/.env
          echo "JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem" >> backend/.env
          echo "JWT_PASSPHRASE=jkl" >> backend/.env
          echo "JWT_TTL=3600" >> backend/.env
          echo "KAFKA_BROKERS=localhost:9092" >> backend/.env
          echo "RATE_LIMITER_ENABLED=false" >> backend/.env
          echo "LOCK_DSN=flock" >> backend/.env
          echo "DEFAULT_URI=http://localhost" >> backend/.env
          echo "APP_SECRET=ci_test_secret_not_used_in_prod" >> backend/.env
          echo "CORS_ALLOW_ORIGIN=.*" >> backend/.env
          # Переопределяем .env.test чтобы использовать 127.0.0.1 вместо Docker-хоста mysql
          echo "APP_ENV=test" > backend/.env.test
          echo "DATABASE_URL=mysql://passfort_user:passfort_password@127.0.0.1:3306/passfort_test?serverVersion=8.0&charset=utf8mb4" >> backend/.env.test
          echo "REDIS_URL=redis://127.0.0.1:6379" >> backend/.env.test
          echo "REDIS_DSN=redis://127.0.0.1:6379" >> backend/.env.test

      - name: Установка зависимостей Composer
        run: cd backend && composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Запуск миграций БД
        run: cd backend && php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Запуск PHPUnit
        env:
          APP_ENV: test
          DATABASE_URL: "mysql://passfort_user:passfort_password@127.0.0.1:3306/passfort_test?serverVersion=8.0&charset=utf8mb4"
          REDIS_URL: "redis://127.0.0.1:6379"
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: "jkl"
          KAFKA_BROKERS: "localhost:9092"
        run: cd backend && php bin/phpunit --testdox

  frontend-tests:
    name: Frontend Tests (Vitest + ESLint + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Установка Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Установка npm зависимостей
        run: cd frontend && npm ci

      - name: Линтинг ESLint
        run: cd frontend && npm run lint

      - name: Запуск тестов Vitest
        run: cd frontend && npm run test

      - name: Проверка сборки
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: /api/v1
