name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Деплой на VPS
    runs-on: ubuntu-latest

    steps:
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "==> Получение последних изменений..."
            git pull origin master

            echo "==> Сборка контейнеров PHP и Nginx..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache php nginx

            echo "==> Запуск контейнеров..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "==> Ожидание запуска PHP контейнера..."
            sleep 5

            echo "==> Запуск миграций БД..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T php php bin/console doctrine:migrations:migrate --no-interaction --env=prod

            echo "==> Очистка кэша Symfony..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T php php bin/console cache:clear --env=prod

            echo "==> Деплой завершён успешно"
