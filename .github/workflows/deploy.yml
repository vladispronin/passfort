name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Деплой на VPS
    runs-on: ubuntu-latest

    steps:
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "==> Получение последних изменений..."
            git pull origin master

            echo "==> Сборка фронтенда..."
            docker run --rm -v $(pwd)/frontend:/app -w /app node:20-alpine sh -c "npm ci && npm run build"

            echo "==> Сборка контейнеров PHP и Nginx..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache php nginx

            echo "==> Запуск контейнеров..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d nginx php mysql redis kafka zookeeper kafka-init messenger-worker

            echo "==> Ожидание запуска PHP контейнера..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T php echo "ready" > /dev/null 2>&1; then
                echo "PHP container is ready"
                break
              fi
              echo "Attempt $i: PHP not ready, waiting 3s..."
              sleep 3
            done

            echo "==> Установка зависимостей Composer..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T -e COMPOSER_MEMORY_LIMIT=-1 php composer install --no-interaction --no-dev --optimize-autoloader

            echo "==> Запуск миграций БД..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T php php bin/console doctrine:migrations:migrate --no-interaction --env=prod

            echo "==> Очистка кэша Symfony..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T php php bin/console cache:clear --env=prod

            echo "==> Деплой завершён успешно"
