security:
    password_hashers:
        App\Entity\User:
            algorithm: argon2id
            memory_cost: 65536
            time_cost: 4
            # threads: 1

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/v1/auth/(login|register|refresh|kdf-params|2fa/verify|verify-email|resend-verification), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/user/email-change/confirm, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
